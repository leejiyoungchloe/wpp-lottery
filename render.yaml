services:
  - type: web
    name: wpp-lottery
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: lottery-data
      mountPath: /var/data
      sizeGB: 1
